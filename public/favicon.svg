<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- House roof -->
  <polygon points="16,5 28,15 4,15" fill="white" opacity="0.95"/>
  <!-- House body -->
  <rect x="8" y="15" width="16" height="12" rx="1" fill="white" opacity="0.95"/>
  <!-- Door -->
  <rect x="13" y="20" width="6" height="7" rx="1" fill="url(#bg)"/>
  <!-- Checkmark badge -->
  <circle cx="24" cy="24" r="5" fill="#22c55e"/>
  <polyline points="21.5,24 23,25.5 26.5,22" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
